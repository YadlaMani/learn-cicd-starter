name: cd
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Build the app
        run: ./scripts/buildprod.sh
      - name: Authenticate to gcp
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: notely-492613
      - name: Build docker image and push to gcp
        run: gcloud builds submit --tag asia-south1-docker.pkg.dev/notely-492613/notely-ar-repo/notely:latest .
      - name: Run db Migration
        run: ./scripts/migrateup.sh
      - name: Deploy the latest build
        run: gcloud run deploy notely --image asia-south1-docker.pkg.dev/notely-492613/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-492613 --max-instances=4
